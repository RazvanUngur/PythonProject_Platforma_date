# /etc/nginx/sites-available/cestrin
# Nginx — CESTRIN Peek Monitor
# Performanță maximă + protecție bot + HTTPS forțat

# ── Rate limiting zones ────────────────────────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=login:10m  rate=8r/m;
limit_req_zone  $binary_remote_addr zone=api:10m    rate=60r/m;
limit_req_zone  $binary_remote_addr zone=upload:10m rate=20r/h;
limit_conn_zone $binary_remote_addr zone=perip:10m;

# ── Redirect HTTP → HTTPS ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name trafic-cestrin.ro www.trafic-cestrin.ro;
    return 301 https://trafic-cestrin.ro$request_uri;
}

# ── Redirect www → non-www ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.trafic-cestrin.ro;
    ssl_certificate     /etc/letsencrypt/live/trafic-cestrin.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trafic-cestrin.ro/privkey.pem;
    return 301 https://trafic-cestrin.ro$request_uri;
}

# ── Server principal ───────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name trafic-cestrin.ro;

    # ── SSL (Let's Encrypt) ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/trafic-cestrin.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trafic-cestrin.ro/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Performanță ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Conexiuni ────────────────────────────────────────────────────────────
    limit_conn perip 20;
    keepalive_timeout 65;
    client_max_body_size 6M;

    # ── Ascunde versiunea nginx ───────────────────────────────────────────────
    server_tokens off;

    # ── Blocare path-uri suspecte ─────────────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl|rb)$ { return 444; }
    location ~* (\.env|\.git|\.htaccess|wp-login|phpmyadmin|xmlrpc|adminer) { return 444; }
    location = /favicon.ico { access_log off; log_not_found off; return 204; }

    # ── Static files cu cache agresiv ─────────────────────────────────────────
    location /static/ {
        alias /home/peekapp/app/frontend/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Login — rate limit strict ─────────────────────────────────────────────
    location = /api/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/proxy_params;
    }

    # ── Upload — rate limit ────────────────────────────────────────────────────
    location = /api/upload-status {
        limit_req zone=upload burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/proxy_params;
    }

    # ── API general ────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/proxy_params;

        # Cache pentru /api/status (ETag gestionat de Flask)
        proxy_cache_bypass $http_authorization;
    }

    # ── App ────────────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/proxy_params;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/cestrin_access.log;
    error_log  /var/log/nginx/cestrin_error.log warn;
}
